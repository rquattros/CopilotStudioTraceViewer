      if (planStack.length > 0) return planStack[planStack.length - 1].container;
      return timeline;
    }

    // Find the best container for an activity based on its plan affiliation
    function getBestContainer(affiliatedPlanId) {
      // If the activity's plan is currently open, place it there
      if (affiliatedPlanId && openPlanContainers[affiliatedPlanId]) {
        return openPlanContainers[affiliatedPlanId];
      }
      // Otherwise use the stack top (chronological position)
      return getCurrentContainer();
    }

    steps.forEach(({ act, cls, title, index: activityIndex }, stepIdx) => {
      const vt = act.valueType || '';

      // --- TURN SEPARATOR: User messages break out of any open plans ---
      if (cls.cat === 'user-message' && planStack.length > 0) {
        // Force-close all open plan groups (mark as "open-ended")
        while (planStack.length > 0) {
          const p = planStack.pop();
          const groupEl = planGroupMap[p.planId];
          if (groupEl) {
            const statusEl = groupEl.querySelector('.plan-status');
            if (statusEl && statusEl.textContent === 'running') {
              statusEl.className = 'plan-status completed';
              statusEl.textContent = 'open-ended';
              statusEl.style.color = 'var(--text-muted)';
              statusEl.style.background = 'rgba(139,148,158,0.15)';
            }
            const countEl = groupEl.querySelector('.plan-step-count');
            if (countEl && planChildCount[p.planId]) {
              countEl.textContent = planChildCount[p.planId] + ' steps';
            }
          }
          delete openPlanContainers[p.planId];
        }
      }

      // --- PLAN OPEN ---
      if (vt === 'DynamicPlanReceived') {
        const planId = act.value.planIdentifier;
        const info = planRegistry[planId] || {};
        const displayName = info.displayName || 'Plan';
        const parentPlanId = info.parentPlanId || null;
        const ancestry = planAncestry(planId);
        const depth = info.depth || 0;
        const colorCls = planColorClass(planId);

        const group = document.createElement('div');
        group.className = 'plan-group';
        group.dataset.planId = planId;

        const header = document.createElement('div');
        header.className = 'plan-group-header';
        header.innerHTML = `
          <span class="plan-icon">&#9654;</span>
          <span class="step-badge badge-plan">PLAN</span>
          <span class="plan-pill ${colorCls}" title="${escapeHtml(planId)}">${escapeHtml(displayName)}</span>
          <span class="plan-id">${escapeHtml(planId.substring(0,8))}...</span>
          ${ancestry ? '<span class="plan-ancestry">' + escapeHtml(ancestry) + '</span>' : ''}
          <span class="plan-status running">running</span>
          <span class="plan-step-count"></span>
        `;

        const children = document.createElement('div');
        children.className = 'plan-group-children';

        group.appendChild(header);
        group.appendChild(children);

        // Smart placement: if this plan has a parentPlanId that's open, nest inside it
        if (parentPlanId && openPlanContainers[parentPlanId]) {
          openPlanContainers[parentPlanId].appendChild(group);
        } else {
          getCurrentContainer().appendChild(group);
        }

        // Add the DynamicPlanReceived step itself inside the plan
        const stepEl = createStepEl(act, cls, title, planId, activityIndex);
        children.appendChild(stepEl);

        planGroupMap[planId] = group;
        planChildCount[planId] = 1;
        openPlanContainers[planId] = children;

        planStack.push({ planId, container: children, displayName });

        header.setAttribute('role', 'button');
        header.setAttribute('tabindex', '0');
        header.setAttribute('aria-expanded', 'true');
        header.setAttribute('aria-label', 'Plan: ' + displayName);
        function togglePlanGroup() {
          group.classList.toggle('collapsed');
          header.setAttribute('aria-expanded', !group.classList.contains('collapsed'));
        }
        header.addEventListener('click', togglePlanGroup);
        header.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePlanGroup(); }
        });
        return;
      }

      // --- PLAN CLOSE ---
      if (vt === 'DynamicPlanFinished') {
        const planId = act.value.planId;

        // Place finish step inside the correct plan
        const container = openPlanContainers[planId] || getCurrentContainer();
        const stepEl = createStepEl(act, cls, title, planId, activityIndex);
        container.appendChild(stepEl);
        planChildCount[planId] = (planChildCount[planId] || 0) + 1;

        // Mark status
        const groupEl = planGroupMap[planId];
        if (groupEl) {
          const statusEl = groupEl.querySelector('.plan-status');
          if (statusEl) {
            statusEl.className = act.value.wasCancelled ? 'plan-status cancelled' : 'plan-status completed';
            statusEl.textContent = act.value.wasCancelled ? 'cancelled' : 'completed';
          }
          const countEl = groupEl.querySelector('.plan-step-count');
          if (countEl && planChildCount[planId]) {
            countEl.textContent = planChildCount[planId] + ' steps';
          }
        }

        // Remove from open containers and stack
        delete openPlanContainers[planId];
        for (let i = planStack.length - 1; i >= 0; i--) {
          if (planStack[i].planId === planId) {
            planStack.splice(i, 1);
            break;
          }
        }
        return;
      }

      // --- PLAN CLOSE via DynamicPlanStepFinished with state=completed ---
      // Some plans (especially root plans) never get a DynamicPlanFinished event.
      // They are closed implicitly when their main step finishes with state "completed".
      if (vt === 'DynamicPlanStepFinished' && act.value && act.value.state === 'completed') {
        const planId = act.value.planIdentifier;
        if (planId && openPlanContainers[planId]) {
          // Place this step inside the plan
          const container = openPlanContainers[planId];
          const stepEl = createStepEl(act, cls, title, planId, activityIndex);
          container.appendChild(stepEl);
          planChildCount[planId] = (planChildCount[planId] || 0) + 1;

          // Close this plan and any child plans still nested above it on the stack
          const stackIdx = planStack.findIndex(p => p.planId === planId);
          if (stackIdx >= 0) {
            while (planStack.length > stackIdx) {
              const p = planStack.pop();
              const groupEl = planGroupMap[p.planId];
              if (groupEl) {
                const statusEl = groupEl.querySelector('.plan-status');
                if (statusEl) {
                  statusEl.className = 'plan-status completed';
                  statusEl.textContent = 'completed';
                }
                const countEl = groupEl.querySelector('.plan-step-count');
                if (countEl && planChildCount[p.planId]) {
                  countEl.textContent = planChildCount[p.planId] + ' steps';
                }
              }
              delete openPlanContainers[p.planId];
            }
          }
          return;
        }
      }

      // --- REGULAR ACTIVITY ---
      const affiliatedPlanId = getActivityPlanAffiliation(act);
      const container = getBestContainer(affiliatedPlanId);
      const stepEl = createStepEl(act, cls, title, affiliatedPlanId, activityIndex);
      container.appendChild(stepEl);

      // Track child count for the plan we placed it in
      const placedInPlan = affiliatedPlanId && openPlanContainers[affiliatedPlanId]
        ? affiliatedPlanId
        : (planStack.length > 0 ? planStack[planStack.length - 1].planId : null);
      if (placedInPlan) {
        planChildCount[placedInPlan] = (planChildCount[placedInPlan] || 0) + 1;
      }
    });

    // Update step counts for any still-open plans
    planStack.forEach(p => {
      const groupEl = planGroupMap[p.planId];
      if (groupEl) {
        const countEl = groupEl.querySelector('.plan-step-count');
        if (countEl && planChildCount[p.planId]) {
          countEl.textContent = planChildCount[p.planId] + ' steps';
        }
      }
    });

    // === STATS PANEL ===
    statsPanel.innerHTML = '';
    statsPanel.classList.remove('hidden');

    // Compute stats
    const totalDurationMs = (firstTs && lastTs) ? (new Date(lastTs) - new Date(firstTs)) : 0;
    const totalDurationStr = totalDurationMs > 0 ? (totalDurationMs / 1000).toFixed(1) + 's' : 'N/A';
    const planCount = Object.keys(planRegistry).length;
    const completedPlans = activities.filter(a => a.valueType === 'DynamicPlanFinished' && a.value && !a.value.wasCancelled).length;
    const cancelledPlans = activities.filter(a => a.valueType === 'DynamicPlanFinished' && a.value && a.value.wasCancelled).length;
    const userTurns = activities.filter(a => a.type === 'message' && a.from && a.from.role === 'user').length;
    const botResponses = activities.filter(a => a.type === 'message' && a.from && a.from.role === 'bot').length;
    const toolCalls = activities.filter(a => a.valueType === 'DynamicPlanStepTriggered').length;
    const searchCalls = activities.filter(a => a.valueType === 'UniversalSearchToolTraceData').length;

    // Find slowest step (skip user messages — user think time shouldn't count)
    let slowestMs = 0, slowestName = '';
    activities.forEach((act, i) => {
      if (act.type === 'message' && act.from && act.from.role === 'user') return;
      const actTs = getTs(act);
      if (i === 0 || !actTs) return;
      const prevTs = getTs(activities[i-1]);
      if (!prevTs) return;
      const diffMs = new Date(actTs) - new Date(prevTs);
      if (diffMs > slowestMs && diffMs < 600000) {
        slowestMs = diffMs;
        slowestName = (act.valueType || act.name || act.type || '').substring(0, 20);
      }
    });
    const slowestStr = slowestMs > 0 ? (slowestMs / 1000).toFixed(1) + 's' : 'N/A';

    const statsData = [
      { value: totalDurationStr, label: 'Total Duration', cls: 'stat-accent' },
      { value: userTurns, label: 'User Turns', cls: '' },
      { value: botResponses, label: 'Bot Responses', cls: '' },
      { value: planCount, label: 'Plans', cls: 'stat-purple' },
      { value: completedPlans, label: 'Completed', cls: 'stat-green' },
      { value: cancelledPlans, label: 'Cancelled', cls: cancelledPlans > 0 ? 'stat-red' : '' },
      { value: toolCalls, label: 'Tool Calls', cls: '' },
      { value: searchCalls, label: 'Searches', cls: '' },
      { value: slowestStr, label: 'Slowest Step', cls: slowestMs > 5000 ? 'stat-red' : slowestMs > 2000 ? 'stat-orange' : '' },
      { value: issues.length, label: 'Issues', cls: issues.length > 0 ? 'stat-red' : 'stat-green' },
    ];
    statsData.forEach(s => {
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = '<div class="stat-value ' + (s.cls || '') + '">' + escapeHtml(String(s.value)) + '</div><div class="stat-label">' + escapeHtml(s.label) + '</div>';
      statsPanel.appendChild(card);
    });

    // === BREADCRUMB TRAIL ===
    breadcrumbBar.innerHTML = '<span class="bc-label">Location:</span><span class="bc-item" data-target="root">Root</span>';
    breadcrumbBar.classList.remove('empty');

    // Intersection observer to update breadcrumb as user scrolls
    const allPlanGroups = timeline.querySelectorAll('.plan-group');
    if (allPlanGroups.length > 0) {
      const observerCallback = () => {
        // Find the plan group(s) currently visible in viewport center
        const viewMid = window.innerHeight / 2;
        let deepestVisible = null;
        let deepestDepth = -1;

        allPlanGroups.forEach(pg => {
          const rect = pg.getBoundingClientRect();
          if (rect.top < viewMid && rect.bottom > viewMid && !pg.classList.contains('collapsed')) {
            // Calculate nesting depth
            let depth = 0;
            let parent = pg.parentElement;
            while (parent && parent !== timeline) {
              if (parent.classList.contains('plan-group-children')) depth++;
              parent = parent.parentElement;
            }
            if (depth >= deepestDepth) {
              deepestDepth = depth;
              deepestVisible = pg;
            }
          }
        });

        // Build breadcrumb chain
        const chain = [];
        let cur = deepestVisible;
        while (cur) {
          const planId = cur.dataset.planId;
          if (planId) {
            const name = planRegistry[planId] ? planRegistry[planId].displayName : planId.substring(0,8);
            chain.unshift({ planId, name, el: cur });
          }
          // Walk up to parent plan-group
          const parentChildren = cur.parentElement;
          cur = parentChildren ? parentChildren.closest('.plan-group') : null;
        }

        // Render breadcrumb
        breadcrumbBar.innerHTML = '<span class="bc-label">Location:</span>';
        const rootItem = document.createElement('span');
        rootItem.className = 'bc-item';
        rootItem.textContent = 'Root';
        rootItem.addEventListener('click', () => timeline.scrollIntoView({ behavior: 'smooth' }));
        breadcrumbBar.appendChild(rootItem);

        chain.forEach(c => {
          const sep = document.createElement('span');
          sep.className = 'bc-sep';
          sep.textContent = ' \u25B8 ';
          breadcrumbBar.appendChild(sep);

          const item = document.createElement('span');
          item.className = 'bc-item';
          item.textContent = c.name;
          item.title = c.planId;
          item.addEventListener('click', () => {
            c.el.classList.remove('collapsed');
            c.el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          breadcrumbBar.appendChild(item);
        });
      };

      // Throttled scroll listener
      let bcRaf = null;
      const scrollHandler = () => {
        if (bcRaf) return;
        bcRaf = requestAnimationFrame(() => {
          observerCallback();
          bcRaf = null;
        });
      };
      window.addEventListener('scroll', scrollHandler, { passive: true });
      scrollCleanup = () => window.removeEventListener('scroll', scrollHandler);
      // Initial
      setTimeout(observerCallback, 100);
    }

    // === CHAT PANE ===
    chatMessages.innerHTML = '';
    const chatActivities = activities.filter(a => a.type === 'message' && a.from);
    // Map activity id to trace step element for cross-linking
    const actIdToStepEl = {};
    timeline.querySelectorAll('.step').forEach(el => {
      if (el._actRef && el._actRef.id) actIdToStepEl[el._actRef.id] = el;
    });

    if (chatActivities.length > 0) {
      chatPane.classList.remove('hidden');
      resizeHandle.classList.remove('hidden');

      chatActivities.forEach(act => {
        const isUser = act.from.role === 'user';
        const isBot = act.from.role === 'bot';
        if (!isUser && !isBot) return;

        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble ' + (isUser ? 'chat-bubble-user' : 'chat-bubble-bot');

        // Name label
        const nameEl = document.createElement('div');
        nameEl.className = 'chat-bubble-name';
        nameEl.textContent = act.from.name || (isUser ? 'User' : 'Bot');
        bubble.appendChild(nameEl);

        // Message text
        const textEl = document.createElement('div');
        textEl.className = 'chat-bubble-text';
        const rawText = act.text || '';
        // Strip citation references like [1] from end, and citeturnXfileY markers
        const cleanText = rawText.replace(/citeturn\d+file\d+/g, '').replace(/\[\d+\]:\s*https?:\/\/\S+\s*"[^"]*"/g, '').trim();
        textEl.innerHTML = simpleMarkdown(cleanText);
        bubble.appendChild(textEl);

        // Citations from entities
        if (act.entities) {
          const citations = [];
          act.entities.forEach(ent => {
            if (ent.citation && Array.isArray(ent.citation)) {
              ent.citation.forEach(c => {
                if (c.appearance && c.appearance.name && c.appearance.url) {
                  citations.push({ name: c.appearance.name, url: c.appearance.url });
                }
              });
            }
          });
          if (citations.length > 0) {
            const citEl = document.createElement('div');
            citEl.className = 'chat-bubble-citations';
            citations.forEach((c, ci) => {
              const a = document.createElement('a');
              a.href = /^https?:\/\//i.test(c.url) ? c.url : '#';
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
              a.textContent = '[' + (ci + 1) + '] ' + c.name.substring(0, 40);
              a.title = c.name;
              citEl.appendChild(a);
            });
            bubble.appendChild(citEl);
          }
        }

        // Timestamp
        const ts = getTs(act);
        if (ts) {
          const tsEl = document.createElement('div');
          tsEl.className = 'chat-bubble-ts';
          tsEl.textContent = formatTime(ts);
          bubble.appendChild(tsEl);
        }

        // Cross-link: click bubble -> scroll trace to matching step
        bubble.addEventListener('click', () => {
          const stepEl = actIdToStepEl[act.id];
          if (stepEl) {
            // Ensure parent plan groups are expanded
            let parent = stepEl.parentElement;
            while (parent && parent !== timeline) {
              if (parent.classList.contains('plan-group') && parent.classList.contains('collapsed')) {
                parent.classList.remove('collapsed');
              }
              parent = parent.parentElement;
            }
            stepEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            stepEl.style.boxShadow = '0 0 0 2px var(--accent)';
            setTimeout(() => { stepEl.style.boxShadow = ''; }, 1500);
          }
        });

        // Store reference for reverse cross-linking (trace -> chat)
        bubble._actId = act.id;

        chatMessages.appendChild(bubble);
      });

      // Reverse cross-link: clicking a message step in trace highlights the chat bubble
      timeline.querySelectorAll('.step').forEach(el => {
        if (!el._actRef || el._actRef.type !== 'message') return;
        const actId = el._actRef.id;
        el.addEventListener('dblclick', () => {
          const bubble = chatMessages.querySelector('.chat-bubble');
          // Find by actId
          for (const b of chatMessages.children) {
            if (b._actId === actId) {
              b.scrollIntoView({ behavior: 'smooth', block: 'center' });
              b.classList.remove('highlight-pulse');
              void b.offsetWidth; // reflow to restart animation
              b.classList.add('highlight-pulse');
              break;
            }
          }
        });
      });
    }

    // === RESIZE HANDLE ===
    (function initResizer() {
      let startX, startWidth;
      const onMouseMove = (e) => {
        const dx = startX - e.clientX;
        const newWidth = Math.max(250, Math.min(window.innerWidth * 0.7, startWidth + dx));
        chatPane.style.width = newWidth + 'px';
      };
      const onMouseUp = () => {
        resizeHandle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      };
      resizeHandle.addEventListener('mousedown', (e) => {
        e.preventDefault();
        startX = e.clientX;
        startWidth = chatPane.offsetWidth;
        resizeHandle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
    })();
  }

  // === EXPORT TO HTML ===
  function exportToHtml() {
    // Capture current viewer state as a self-contained HTML file
    const styles = document.querySelector('style').outerHTML;
    const headerHtml = document.querySelector('header').outerHTML;
    const viewerEl = document.getElementById('viewer');

    // Clone viewer, remove interactive-only elements (toolbar buttons, search)
    const clone = viewerEl.cloneNode(true);
    clone.classList.remove('hidden');
    // Remove toolbar buttons except file name
    const cloneToolbar = clone.querySelector('.toolbar');
    if (cloneToolbar) {
      const btns = cloneToolbar.querySelectorAll('.toolbar-btn, .search-box');
      btns.forEach(b => b.remove());
      const spacers = cloneToolbar.querySelectorAll('.toolbar-spacer');
      spacers.forEach(s => s.remove());
    }
    // Remove copy buttons
    clone.querySelectorAll('.step-copy').forEach(b => b.remove());
    // Remove breadcrumb bar
    const bc = clone.querySelector('.breadcrumb-bar');
    if (bc) bc.remove();
    // Expand all steps and plan groups for the report
    clone.querySelectorAll('.plan-group.collapsed').forEach(pg => pg.classList.remove('collapsed'));
    // Keep steps collapsed in export (user can toggle via inline script)

    const toggleScript = `<script>
      document.addEventListener('click', function(e) {
        var header = e.target.closest('.step-header');
        if (header) { header.closest('.step').classList.toggle('expanded'); }
        var pgHeader = e.target.closest('.plan-group-header');
        if (pgHeader) { pgHeader.closest('.plan-group').classList.toggle('collapsed'); }
        var rawH4 = e.target.closest('h4[onclick]');
        if (rawH4 && rawH4.nextElementSibling) { rawH4.nextElementSibling.classList.toggle('hidden'); }
      });
    <\/script>`;

    const exportHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Report - ${escapeHtml(currentFileName)} - ${new Date().toLocaleDateString()}</title>
${styles}
<style>
  .toolbar { justify-content: flex-start; }
  .step-header, .plan-group-header { cursor: pointer; }
  body::after { content: 'Generated by Copilot Studio Trace Viewer on ${new Date().toLocaleString()}'; display: block; text-align: center; padding: 20px; color: var(--text-muted); font-size: 11px; }
</style>
</head>
<body>
${headerHtml}
<div class="container">
${clone.outerHTML}
</div>
${toggleScript}
</body>
</html>`;

    const blob = new Blob([exportHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'trace-report-' + (currentFileName.replace(/\.[^.]+$/, '')) + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // === COMPARE MODE ===
  function enterCompareMode(dataA) {
    const fileNameA = currentFileName;

    // Clean up scroll listener before switching views
    if (scrollCleanup) { scrollCleanup(); scrollCleanup = null; }

    // Hide main viewer, show compare view
    viewer.classList.add('hidden');
    uploadZone.classList.add('hidden');
    compareView.classList.remove('hidden');
    compareView.innerHTML = '';

    // Compare toolbar
    const cToolbar = document.createElement('div');
    cToolbar.className = 'toolbar';
    cToolbar.style.marginBottom = '16px';

    const cTitle = document.createElement('span');
    cTitle.style.cssText = 'font-size:14px;font-weight:600;color:#fff;';
    cTitle.textContent = 'Compare Traces';
    cToolbar.appendChild(cTitle);

    const cSpacer = document.createElement('span');
    cSpacer.className = 'toolbar-spacer';
    cToolbar.appendChild(cSpacer);

    const backBtn = document.createElement('button');
    backBtn.className = 'toolbar-btn primary';
    backBtn.innerHTML = '&#8592; Back to viewer';
    backBtn.addEventListener('click', () => {
      compareView.classList.add('hidden');
      compareView.innerHTML = '';
      viewer.classList.remove('hidden');
    });
    cToolbar.appendChild(backBtn);
    compareView.appendChild(cToolbar);

    // Upload zone for second file
    const uploadArea = document.createElement('div');
    uploadArea.className = 'compare-upload-zone';
    uploadArea.innerHTML = '<div class="compare-icon">&#128196; &#8596; &#128196;</div><p>Drop or click to upload the second trace file (.json or .zip)</p>';
    const fileInput2 = document.createElement('input');
    fileInput2.type = 'file';
    fileInput2.accept = '.json,.zip';
    fileInput2.style.display = 'none';
    uploadArea.appendChild(fileInput2);

    uploadArea.addEventListener('click', () => fileInput2.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) loadSecondFile(e.dataTransfer.files[0]);
    });
    fileInput2.addEventListener('change', e => { if (e.target.files.length) loadSecondFile(e.target.files[0]); });

    compareView.appendChild(uploadArea);

    async function loadSecondFile(file) {
      const fileNameB = file.name;
      const ext = file.name.toLowerCase().split('.').pop();
      let dataB;

      try {
        if (ext === 'zip') {
          const arrayBuf = await file.arrayBuffer();
          const jsonText = await extractJsonFromZip(arrayBuf);
          dataB = JSON.parse(jsonText);
        } else {
          const text = await file.text();
          dataB = JSON.parse(text);
        }
      } catch (err) {
        alert('Error loading second file: ' + err.message);
        return;
      }

      if (!dataB.activities || !dataB.activities.length) {
        alert('No activities found in second file.');
        return;
      }

      uploadArea.remove();
      renderComparison(dataA, fileNameA, dataB, fileNameB);
    }

    function renderComparison(dA, fnA, dB, fnB) {
      const actsA = dA.activities || [];
      const actsB = dB.activities || [];

      // Compute stats for both
      function computeStats(acts) {
        let tsFirst = null, tsLast = null;
        for (let i = 0; i < acts.length; i++) {
          const t = acts[i].timestamp || acts[i].localTimestamp;
          if (t) { tsFirst = new Date(t); break; }
        }
        for (let i = acts.length - 1; i >= 0; i--) {
          const t = acts[i].timestamp || acts[i].localTimestamp;
          if (t) { tsLast = new Date(t); break; }
        }
        const duration = tsFirst && tsLast ? ((tsLast - tsFirst) / 1000).toFixed(1) + 's' : 'N/A';
        const userTurns = acts.filter(a => a.type === 'message' && a.from && a.from.role === 'user').length;
        const botMsgs = acts.filter(a => a.type === 'message' && a.from && a.from.role === 'bot').length;
        const plans = acts.filter(a => a.valueType === 'DynamicPlanReceived').length;
        const completed = acts.filter(a => a.valueType === 'DynamicPlanFinished' && a.value && !a.value.wasCancelled).length;
        const cancelled = acts.filter(a => a.valueType === 'DynamicPlanFinished' && a.value && a.value.wasCancelled).length;
        const toolCalls = acts.filter(a => a.valueType === 'DynamicPlanStepTriggered').length;
        const searches = acts.filter(a => a.valueType === 'UniversalSearchToolTraceData').length;
        const errors = acts.filter(a => {
          if (a.valueType === 'DialogTracingInfo' && a.value && a.value.actions) {
            return a.value.actions.some(ac => ac.exception);
          }
          if (a.valueType === 'DynamicPlanStepFinished' && a.value) {
            const st = (a.value.state || '').toLowerCase();
            return st === 'error' || st === 'failed' || st === 'faulted';
          }
          return false;
        }).length;
        // Unique valueTypes
        const vts = [...new Set(acts.filter(a => a.valueType).map(a => a.valueType))];
        return { total: acts.length, duration, userTurns, botMsgs, plans, completed, cancelled, toolCalls, searches, errors, vts };
      }

      const sA = computeStats(actsA);
      const sB = computeStats(actsB);

      // Diff summary
      const summary = document.createElement('div');
      summary.className = 'compare-summary';
      const diffRows = [
        ['Total Activities', sA.total, sB.total],
        ['Duration', sA.duration, sB.duration],
        ['User Turns', sA.userTurns, sB.userTurns],
        ['Bot Responses', sA.botMsgs, sB.botMsgs],
        ['Plans', sA.plans, sB.plans],
        ['Completed Plans', sA.completed, sB.completed],
        ['Cancelled Plans', sA.cancelled, sB.cancelled],
        ['Tool Calls', sA.toolCalls, sB.toolCalls],
        ['Searches', sA.searches, sB.searches],
        ['Errors', sA.errors, sB.errors],
      ];

      let gridHtml = '<h3>&#128200; Comparison Summary</h3><div class="diff-grid">';
      gridHtml += '<div class="diff-label"></div><div class="diff-label" style="color:var(--accent)">' + escapeHtml(fnA) + '</div><div class="diff-label" style="color:var(--purple)">' + escapeHtml(fnB) + '</div>';
      diffRows.forEach(([label, valA, valB]) => {
        const changed = String(valA) !== String(valB);
        gridHtml += '<div class="diff-label">' + escapeHtml(label) + '</div>';
        gridHtml += '<div class="diff-val' + (changed ? ' diff-changed' : '') + '">' + escapeHtml(String(valA)) + '</div>';
        gridHtml += '<div class="diff-val' + (changed ? ' diff-changed' : '') + '">' + escapeHtml(String(valB)) + '</div>';
      });
      gridHtml += '</div>';
      summary.innerHTML = gridHtml;
      compareView.appendChild(summary);

      // Side-by-side panes
      const container = document.createElement('div');
      container.className = 'compare-container';

      function buildPane(acts, fileName, labelCls) {
        const pane = document.createElement('div');
        pane.className = 'compare-pane';

        const header = document.createElement('div');
        header.className = 'pane-header';
        header.innerHTML = '<span class="pane-label ' + labelCls + '">' + (labelCls === 'pane-label-a' ? 'A' : 'B') + '</span>' +
          '<span class="pane-filename">' + escapeHtml(fileName) + '</span>' +
          '<span style="font-size:11px;color:var(--text-muted)">' + acts.length + ' activities</span>';
        pane.appendChild(header);

        const body = document.createElement('div');
        body.className = 'pane-body';

        const tl = document.createElement('div');
        tl.className = 'timeline';

        acts.forEach(act => {
          const cls = classifyActivity(act);
          const title = buildTitle(act, cls);
          const ts = getTs(act);

          const step = document.createElement('div');
          step.className = 'step type-' + cls.cat;
          step.innerHTML = `
            <div class="dot"></div>
            <div class="step-card">
              <div class="step-header">
                <span class="step-badge ${cls.badgeCls}">${cls.badge}</span>
                <span class="step-title">${escapeHtml(title)}</span>
                <span class="step-time">${formatTime(ts)}</span>
                <span class="step-chevron">&#9654;</span>
              </div>
              <div class="step-detail">${buildDetail(act, cls)}</div>
            </div>`;
          step.querySelector('.step-header').addEventListener('click', () => step.classList.toggle('expanded'));
          tl.appendChild(step);
        });

        body.appendChild(tl);
        pane.appendChild(body);
        return pane;
      }

      container.appendChild(buildPane(actsA, fnA, 'pane-label-a'));
      container.appendChild(buildPane(actsB, fnB, 'pane-label-b'));
      compareView.appendChild(container);
    }
  }
})();
</script>
</body>
</html>
